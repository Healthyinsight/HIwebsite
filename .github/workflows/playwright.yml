name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browser binaries keyed to the installed version.
      # The browsers only change when @playwright/test is updated.
      - name: Get Playwright version
        id: pw-version
        run: |
          echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # When the browser binary is cached, still install OS-level deps
      # (fonts, shared libraries) which are not cached.
      - name: Install Playwright system dependencies (cached run)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          # If tests hit the live site rather than a local dev server, set
          # BASE_URL as a GitHub Secret and it will be passed through here:
          # BASE_URL: ${{ secrets.BASE_URL }}
          #
          # The newsletter API route calls Resend — add this secret if any
          # e2e test exercises the /api/subscribe endpoint:
          # RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Upload test report and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
